name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Test suite (unittest)
        run: python -m unittest discover -p "test_*.py"

      - name: Deterministic ledger + tamper detection
        run: python agent_ledger.py

      - name: Clearance gate demonstration
        run: python policy_gate_demo.py

      - name: Forgery / anchor detection
        run: python forgery_demo.py

      - name: C# independent re-derivation (cross-runtime)
        run: dotnet run --project xrt_verify -- agent_ledger.jsonl

      - name: Node independent re-derivation (cross-runtime)
        run: node verify.js agent_ledger.jsonl
